services:
  - type: web
    name: oblixel-backend
    runtime: node
    buildCommand: cd backend && npm install
    startCommand: cd backend && node server.js
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: ADMIN_EMAIL
        value: mutaurijoe@gmail.com
      - key: NODE_ENV
        value: production
    plan: free

  - type: static
    name: oblixel-frontend
    runtime: static
    buildCommand: echo "Static site ready"
    staticPublishPath: ./frontend
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
